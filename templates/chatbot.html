<!DOCTYPE html>
<html>

<head>

    <title>Stress Assessment Agent</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>

        body{
            font-family:Arial;
            background:#f4f6f9;
        }

        .chat-container{
            width:70%;
            margin:40px auto;
            background:white;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
        }

        .header{
            background:#1d4ed8;
            color:white;
            padding:15px;
            font-size:22px;
            border-radius:10px 10px 0 0;
        }

        #chat-box{
            height:450px;
            overflow-y:auto;
            padding:20px;
        }

        .bot{
            background:#e5e7eb;
            padding:10px;
            border-radius:10px;
            margin-bottom:10px;
        }

        .user{
            background:#2563eb;
            color:white;
            padding:10px;
            border-radius:10px;
            margin-bottom:10px;
            text-align:right;
        }

        .input-area{
            display:flex;
            padding:15px;
        }

        input{
            flex:1;
            padding:10px;
            font-size:16px;
        }

        button{
            width:120px;
            margin-left:10px;
            background:#2563eb;
            color:white;
            border:none;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="chat-container">

<div class="header">

🤖 Stress Assessment Agent

</div>

<div id="chat-box">

<div class="bot">

Hello 👋<br><br>

I'm your AI Stress Assessment Agent.<br><br>

Type <b>start</b> to begin your assessment.

</div>

</div>

<div class="input-area">

<input
id="message"
type="text"
placeholder="Type here...">

<button onclick="sendMessage()">

Send

</button>

</div>

</div>

<script>

function sendMessage(){

let input=document.getElementById("message");

let message=input.value;

if(message=="") return;

let chat=document.getElementById("chat-box");

chat.innerHTML+=`<div class="user">${message}</div>`;

fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

message:message

})

})

.then(response=>response.json())

.then(data=>{

chat.innerHTML+=`<div class="bot">${data.reply}</div>`;

chat.scrollTop=chat.scrollHeight;

});

input.value="";

}

</script>

</body>

</html>
