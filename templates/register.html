<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="auth-container">

    <!-- LEFT SIDE -->

    <div class="auth-left">

        <h1>Create Your Account</h1>

        <p>
            Register to access the Examination Stress Detection
            and Advisory System. This platform helps students
            monitor stress levels and receive intelligent
            recommendations during examination periods.
        </p>

    </div>

    <!-- RIGHT SIDE -->

    <div class="auth-right">

        <div class="auth-box">

            <h2>Create Account</h2>

            <form action="/register_user" method="POST">

                <!-- USERNAME -->

                <div class="form-group">

                    <label>Username</label>

                    <input type="text"
                    name="username"
                    placeholder="Enter username"
                    required>

                </div>

                <!-- PASSWORD -->

                <div class="form-group">

                    <label>Password</label>

                    <input type="password"
                    name="password"
                    placeholder="Create password"
                    required>

                </div>

                <!-- CONFIRM PASSWORD -->

                <div class="form-group">

                    <label>Confirm Password</label>

                    <input type="password"
                    name="confirm_password"
                    placeholder="Confirm password"
                    required>

                </div>

                <!-- BUTTON -->

                <button type="submit">

                    Register

                </button>

            </form>

            <br>

            <p style="text-align:center;">

                Already have an account?

             <a href="/login_page">
    Login here
</a>

            </p>

        </div>

    </div>

</div>

</body>

</html>
